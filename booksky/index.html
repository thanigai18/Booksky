<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booksky</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="navbar">
        <h1>Booksky</h1>
    </div>

    <div class="container">
        <div class="Book-container">
            <h2>Rich Dad Poor Dad</h2>
            <h5>robert</h5>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Consectetur odio rerum inventore veritatis architecto non vel, labore blanditiis asperiores neque suscipit aut fugiat quibusdam obcaecati est numquam accusantium quam laudantium?</p>
            <button>Delete</button>
        </div>
    </div>

    <div class="popup-overlay"></div>
    <div class="popup-box">
        <h2>Add Book</h2>
        <form>
            <input type="text" placeholder="Book Title" id="book-title-input">
            <input type="text" placeholder="Book Author" id="book-author-input">
            <textarea placeholder="Short Description" id="book-description-input"></textarea>
            <button id="Add-book">ADD</button>
            <button id="Cancel-popup">CANCEL</button>
        </form>

    </div>

    <button class="add-button" id="add-popup-buttton">+</button>


    <script src="script.js"></script>
</body>
</html>
